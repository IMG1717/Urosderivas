<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Baloncesto Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="logo">🏀 Club Pro</div>
  <nav>
    <a href="#">Inicio</a>
    <a href="#equipo">Equipo</a>
    <a href="#noticias">Noticias</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<section class="hero">
  <h1>Pasión por el baloncesto</h1>
</section>

<section id="equipo" class="section">
  <h2>Equipo</h2>
  <div class="grid">
    <div class="card">
      <img src="https://picsum.photos/300/200?1">
      <h3>Jugador 1</h3>
      <p>Base</p>
    </div>
    <div class="card">
      <img src="https://picsum.photos/300/200?2">
      <h3>Jugador 2</h3>
      <p>Alero</p>
    </div>
    <div class="card">
      <img src="https://picsum.photos/300/200?3">
      <h3>Jugador 3</h3>
      <p>Pívot</p>
    </div>
  </div>
</section>

<section id="noticias" class="section dark">
  <h2>Noticias</h2>
  <div class="grid">
    <div class="card">
      <img src="https://picsum.photos/300/200?4">
      <h3>Gran victoria</h3>
      <p>El equipo gana en casa.</p>
    </div>
    <div class="card">
      <img src="https://picsum.photos/300/200?5">
      <h3>Nuevo fichaje</h3>
      <p>Refuerzo para la temporada.</p>
    </div>
  </div>
</section>

<section id="contacto" class="section">
  <h2>Contacto</h2>
  <p>Email: club@baloncesto.com</p>
</section>

<footer class="footer">
  <p>© 2026 Club Baloncesto</p>
</footer>

</body>
</html>
